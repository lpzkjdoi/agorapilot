name: Back CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write

jobs:
  back-tests:
    name: Back CI / back-tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: mvn -B test