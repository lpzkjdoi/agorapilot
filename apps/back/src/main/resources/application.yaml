spring:
  application:
    name: agorapilot-back
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/agorapilot-db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG

server:
  port: ${PORT:8080}

facebook:
  api-base-url: ${FACEBOOK_API_BASE_URL}
  api-version: ${FACEBOOK_API_VERSION}
  client-secret: ${FACEBOOK_CLIENT_SECRET:}
  client-id: ${FACEBOOK_CLIENT_ID:}
  page-id: ${FACEBOOK_PAGE_ID}
  access-token: ${FACEBOOK_PAGE_ACCESS_TOKEN}
